services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polling
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/polling
    depends_on:
      db:
        condition: service_healthy
