services:
  db_core:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polling
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_users:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  core_service:
    build:
      context: .
      dockerfile: src/core_service/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db_core:5432/polling
      USERS_SERVICE_URL: http://users_service:8001/api/v2/users
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
    depends_on:
      db_core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  users_service:
    build:
      context: .
      dockerfile: src/users_service/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db_users:5432/users
    depends_on:
      db_users:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - core_service
      - users_service
