apiVersion: v1
kind: Service
metadata:
  name: workflow-service
  namespace: microservices
spec:
  ports:
    - port: 8002
      targetPort: 8002
  selector:
    app: workflow-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-service
  template:
    metadata:
      labels:
        app: workflow-service
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres-workflow 5432 && nc -z rabbitmq 5672 && nc -z core-service 8000; do sleep 2; done
      containers:
        - name: workflow-service
          image: workflow-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: database-url-workflow
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: app-env
                  key: RABBITMQ_URL
            - name: POLL_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-env
                  key: POLL_SERVICE_URL
            - name: VOTE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-env
                  key: VOTE_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /api/v2/workflows/health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v2/workflows/health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
