apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx
  namespace: microservices
data:
  default.conf: |
    upstream core_service {
        server core-service:8000;
    }
    upstream users_service {
        server users-service:8001;
    }
    upstream workflow_service {
        server workflow-service:8002;
    }
    server {
        listen 80;
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }
        location /api/v2/core/ {
            proxy_pass http://core_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-Id $http_x_correlation_id;
        }
        location /api/v2/users/ {
            proxy_pass http://users_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-Id $http_x_correlation_id;
        }
        location /api/v2/workflows/ {
            proxy_pass http://workflow_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-Id $http_x_correlation_id;
        }
    }
