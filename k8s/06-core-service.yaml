apiVersion: v1
kind: Service
metadata:
  name: core-service
  namespace: microservices
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: core-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-service
  template:
    metadata:
      labels:
        app: core-service
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres-core 5432 && nc -z rabbitmq 5672 && nc -z users-service 8001; do sleep 2; done
      containers:
        - name: core-service
          image: core-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: database-url-core
            - name: USERS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-env
                  key: USERS_SERVICE_URL
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: app-env
                  key: RABBITMQ_URL
          readinessProbe:
            httpGet:
              path: /api/v2/core/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v2/core/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
