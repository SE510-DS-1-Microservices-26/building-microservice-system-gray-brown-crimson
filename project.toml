[project]
name = "polling-system-api"
requires-python = ">=3.12"


[tool.ruff]
target-version = "py312"

exclude = [
    ".git",
    ".mypy_cache",
    ".ruff_cache",
    ".venv",
    "__pypackages__",
    "build",
    "dist",
    "venv",
]


[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "UP", "B", "SIM"
]


[tool.mypy]
plugins = [
    "pydantic.mypy"
]
strict = true


[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true